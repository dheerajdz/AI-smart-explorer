version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: smart-explorer-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: smart-explorer-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: smart-explorer

volumes:
  redis-data:
  mongo-data:
